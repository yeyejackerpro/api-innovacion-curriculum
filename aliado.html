<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>aliados</title>
</head>
<body>
    <div class="container">
        <h1>Aliados</h1>
        <form id="form">
            <input type="text" id="nit" placeholder="NIT" required>
            <input type="text" id="razon_social" placeholder="Razon Social" required>
            <input type="text" id="nombre_contacto" placeholder="Nombre Contacto" required>
            <input type="text" id="correo" placeholder="Correo"required>
            <input type="text" id="telefono" placeholder="Telefono"required>
            <input type="text" id="ciudad" placeholder="Ciudad" required>            
            <button>Guardar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>NIT</th><th>Razon Social</th><th>Contacto</th><th>Correo</th><th>Telefono</th><th>Ciudad</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
    </div>

<script src="app.js"></script>
</body>
</html>
