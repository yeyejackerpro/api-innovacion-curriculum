<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación Programa - Innovación Curricular</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Asignar Innovación Curricular a Programa</h1>
    <form action="http://localhost:8000/api/programa_ci" method="POST">
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <select name="car_innovacion_id" id="car_innovacion_id" required>
            <option value="">Seleccione Innovación (FK)...</option>
            <option value="1">Innovación Ejemplo</option>
        </select>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Programa FK</th>
                <th>Innovación FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
