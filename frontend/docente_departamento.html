<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vinculación Docente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Vinculación Docente a Programa</h1>
    <form action="http://localhost:8000/api/docente_departamento" method="POST">
        <select name="docente_id" id="docente_id" required>
            <option value="">Seleccione Docente (FK)...</option>
            <option value="1">Docente Ejemplo</option>
        </select>
        <select name="departamento_id" id="departamento_id" required>
            <option value="">Seleccione Programa/Dpto (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <select name="dedicacion" id="dedicacion" required>
            <option value="">Seleccione Dedicación...</option>
            <option value="Tiempo Completo">Tiempo Completo</option>
            <option value="Medio Tiempo">Medio Tiempo</option>
            <option value="Cátedra">Cátedra</option>
        </select>
        <input type="text" name="modalidad" id="modalidad" placeholder="Modalidad" required>
        <label for="fecha_ingreso">Ingreso:</label>
        <input type="date" name="fecha_ingreso" id="fecha_ingreso" required>
        <label for="fecha_salida">Salida:</label>
        <input type="date" name="fecha_salida" id="fecha_salida">
        <button type="submit">Vincular</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Docente</th>
                <th>Programa</th>
                <th>Dedicación</th>
                <th>Vigencia</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
