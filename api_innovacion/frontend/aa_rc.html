<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad Académica en Registro Calificado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Vincular Actividad Académica y RC</h1>
    <form id="form-aa-rc">
        <input type="hidden" id="id_registro" name="id_registro">
        <select name="registro_calificado_codigo" id="codigo_rc" required>
            <option value="">Seleccione Registro Calificado (FK)...</option>
            <option value="1">RC Ejemplo</option>
        </select>
        <select name="activ_academicas_idcurso" id="actividad_id" required>
            <option value="">Seleccione Actividad Académica (FK)...</option>
            <option value="1">Actividad Ejemplo</option>
        </select>
        <input type="text" name="componente" id="componente" placeholder="Componente" required>
        <input type="number" name="semestre" id="semestre" placeholder="Semestre" required>
        <button type="submit" id="btn-submit">Asignar</button>
        <button type="button" id="btn-cancelar" style="display:none;">Cancelar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>RC FK</th>
                <th>Actividad FK</th>
                <th>Componente</th>
                <th>Semestre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
    let registroEnEdicion = null;

    function cargarSelects() {
        // Cargar Registro Calificado
        fetch("http://localhost:8000/api/registro_calificado")
        .then(response => {
            console.log("Response registro_calificado status:", response.status);
            if (response.status === 204) return { datos: [] };
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log("Datos registro_calificado:", data);
            const select = document.getElementById("codigo_rc");
            if (data.datos && data.datos.length > 0) {
                select.innerHTML = '<option value="">Seleccione Registro Calificado (FK)...</option>';
                data.datos.forEach(obj => {
                    select.innerHTML += `<option value="${obj.codigo}">${obj.nombre || obj.codigo}</option>`;
                });
            } else {
                select.innerHTML = '<option value="">No hay registros calificados disponibles</option>';
            }
        })
        .catch(error => {
            console.error("Error cargando registro calificado:", error);
            document.getElementById("codigo_rc").innerHTML = `<option value="">Error: ${error.message}</option>`;
        });

        // Cargar Actividad Académica
        fetch("http://localhost:8000/api/activ_academica")
        .then(response => {
            console.log("Response activ_academica status:", response.status);
            if (response.status === 204) return { datos: [] };
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log("Datos activ_academica:", data);
            const select = document.getElementById("actividad_id");
            if (data.datos && data.datos.length > 0) {
                select.innerHTML = '<option value="">Seleccione Actividad Académica (FK)...</option>';
                data.datos.forEach(obj => {
                    select.innerHTML += `<option value="${obj.id}">${obj.nombre || obj.id}</option>`;
                });
            } else {
                select.innerHTML = '<option value="">No hay actividades académicas disponibles</option>';
            }
        })
        .catch(error => {
            console.error("Error cargando actividad académica:", error);
            document.getElementById("actividad_id").innerHTML = `<option value="">Error: ${error.message}</option>`;
        });
    }

    function cargarTabla() {
        fetch("http://localhost:8000/api/aa_rc")
        .then(response => {
            console.log("Response status:", response.status, "OK:", response.ok);
            if (response.status === 204) {
                return { datos: [] };
            }
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log("Datos recibidos de aa_rc:", data);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            if (data.datos && Array.isArray(data.datos)) {
                if (data.datos.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>';
                } else {
                    data.datos.forEach(objeto => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${objeto.registro_calificado_codigo}</td>
                                <td>${objeto.activ_academicas_idcurso}</td>
                                <td>${objeto.componente}</td>
                                <td>${objeto.semestre}</td>
                                <td>
                                    <button type="button" class="btn-editar" onclick="editarRegistro(${objeto.id}, '${objeto.registro_calificado_codigo}', ${objeto.activ_academicas_idcurso}, '${objeto.componente}', ${objeto.semestre})">Editar</button>
                                    <button type="button" class="btn-eliminar" onclick="eliminarRegistro(${objeto.id})">Eliminar</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } else {
                tabla.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Estructura de respuesta incorrecta</td></tr>';
                console.error("Estructura incorrecta:", data);
            }
        })
        .catch(error => {
            console.error("Error al cargar los datos:", error);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error: ${error.message}</td></tr>`;
        });
    }

    function editarRegistro(id, codigo_rc, idcurso, componente, semestre) {
        registroEnEdicion = id;
        document.getElementById("id_registro").value = id;
        document.getElementById("codigo_rc").value = codigo_rc;
        document.getElementById("actividad_id").value = idcurso;
        document.getElementById("componente").value = componente;
        document.getElementById("semestre").value = semestre;
        document.getElementById("btn-submit").textContent = "Actualizar";
        document.getElementById("btn-cancelar").style.display = "inline-block";
        document.getElementById("form-aa-rc").scrollIntoView({ behavior: "smooth" });
    }

    function cancelarEdicion() {
        registroEnEdicion = null;
        document.getElementById("form-aa-rc").reset();
        document.getElementById("id_registro").value = "";
        document.getElementById("btn-submit").textContent = "Asignar";
        document.getElementById("btn-cancelar").style.display = "none";
    }

    function eliminarRegistro(id) {
        if (!confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            return;
        }
        fetch(`http://localhost:8000/api/aa_rc/id/${id}`, {
            method: "DELETE"
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor (DELETE):", result);
            if (result.ok) {
                alert("Registro eliminado exitosamente.");
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al eliminar el registro:", error);
            alert("Error al eliminar el registro: " + error.message);
        });
    }

    window.onload = function() {
        cargarSelects();
        cargarTabla();
        document.getElementById("btn-cancelar").addEventListener("click", cancelarEdicion);
    }

    document.getElementById("form-aa-rc").addEventListener("submit", function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        const jsonData = {};
        for (let [key, value] of formData.entries()) {
            jsonData[key] = value;
        }
        
        // Si hay un registro en edición, excluir el id_registro del payload
        const idRegistro = jsonData.id_registro;
        delete jsonData.id_registro;
        
        console.log("Enviando datos:", jsonData, "En edición:", registroEnEdicion);
        
        const metodo = registroEnEdicion ? "PUT" : "POST";
        const url = registroEnEdicion 
            ? `http://localhost:8000/api/aa_rc/id/${idRegistro}` 
            : "http://localhost:8000/api/aa_rc";

        fetch(url, {
            method: metodo,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(jsonData)
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor:", result);
            if (result.ok && result.data.estado === 200) {
                alert(registroEnEdicion ? "Registro actualizado exitosamente." : "Registro creado exitosamente.");
                cancelarEdicion();
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al enviar el formulario:", error);
            alert("Error al enviar el formulario: " + error.message);
        });
    });
</script>


</body>
</html>
