<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registros Calificados</title>
    <link rel="stylesheet" href="styles.css">    <script src="config.js"></script></head>
<body>
<div class="container">
    <h1>Registros Calificados</h1>
    <form id="form-rc">
        <input type="hidden" id="id_registro" name="id_registro">
        <input type="text" name="codigo" id="codigo" placeholder="Código (PK)" required>
        <input type="number" name="cant_creditos" id="cant_creditos" placeholder="Cant. Créditos" required>
        <input type="number" name="hora_acom" id="hora_acom" placeholder="Horas Acompañamiento" required>
        <input type="number" name="hora_ind" id="hora_ind" placeholder="Horas Independientes" required>
        <input type="text" name="metodologia" id="metodologia" placeholder="Metodología" required>
        <label for="fecha_inicio">Fecha Inicio:</label>
        <input type="date" name="fecha_inicio" id="fecha_inicio" required>
        <label for="fecha_fin">Fecha Fin:</label>
        <input type="date" name="fecha_fin" id="fecha_fin" required>
        <input type="number" name="duracion_anios" id="duracion_anios" placeholder="Duración Años" required>
        <input type="number" name="duracion_semestres" id="duracion_semestres" placeholder="Duración Semestres" required>
        <input type="text" name="tipo_titulacion" id="tipo_titulacion" placeholder="Tipo Titulación" required>
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
        </select>
        <button type="submit" id="btn-submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none;">Cancelar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Código (PK)</th>
                <th>Créditos</th>
                <th>Metodología</th>
                <th>Vigencia</th>
                <th>Programa FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
    function cargarProgramas() {
        fetch(`${API_BASE}/api/programa`)
        .then(response => {
            console.log("Response programa status:", response.status);
            if (response.status === 204) return { datos: [] };
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log("Datos programa:", data);
            const select = document.getElementById("programa_id");
            if (data.datos && data.datos.length > 0) {
                select.innerHTML = '<option value="">Seleccione Programa (FK)...</option>';
                data.datos.forEach(obj => {
                    select.innerHTML += `<option value="${obj.id}">${obj.nombre || obj.id}</option>`;
                });
            } else {
                select.innerHTML = '<option value="">No hay programas disponibles</option>';
            }
        })
        .catch(error => {
            console.error("Error cargando programas:", error);
            document.getElementById("programa_id").innerHTML = `<option value="">Error: ${error.message}</option>`;
        });
    }

    function cargarTabla() {
        fetch(`${API_BASE}/api/registro_calificado`)
        .then(response => {
            console.log("Response status:", response.status, "OK:", response.ok);
            if (response.status === 204) {
                return { datos: [] };
            }
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log("Datos recibidos de registro_calificado:", data);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            if (data.datos && Array.isArray(data.datos)) {
                if (data.datos.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay registros</td></tr>';
                } else {
                    data.datos.forEach(objeto => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${objeto.codigo}</td>
                                <td>${objeto.cant_creditos}</td>
                                <td>${objeto.metodologia}</td>
                                <td>${objeto.fecha_inicio} - ${objeto.fecha_fin}</td>
                                <td>${objeto.programa_id}</td>
                                <td>
                                    <button type="button" class="btn-editar" onclick="editarRegistro('${objeto.codigo}', ${objeto.cant_creditos}, ${objeto.hora_acom}, ${objeto.hora_ind}, '${objeto.metodologia}', '${objeto.fecha_inicio}', '${objeto.fecha_fin}', ${objeto.duracion_anios}, ${objeto.duracion_semestres}, '${objeto.tipo_titulacion}', ${objeto.programa_id})">Editar</button>
                                    <button type="button" class="btn-eliminar" onclick="eliminarRegistro('${objeto.codigo}')">Eliminar</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } else {
                tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Estructura de respuesta incorrecta</td></tr>';
                console.error("Estructura incorrecta:", data);
            }
        })
        .catch(error => {
            console.error("Error al cargar los datos:", error);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Error: ${error.message}</td></tr>`;
        });
    }

    function editarRegistro(codigo, cant_creditos, hora_acom, hora_ind, metodologia, fecha_inicio, fecha_fin, duracion_anios, duracion_semestres, tipo_titulacion, programa_id) {
        registroEnEdicion = codigo;
        document.getElementById("id_registro").value = codigo;
        document.getElementById("codigo").value = codigo;
        document.getElementById("codigo").disabled = true;
        document.getElementById("cant_creditos").value = cant_creditos;
        document.getElementById("hora_acom").value = hora_acom;
        document.getElementById("hora_ind").value = hora_ind;
        document.getElementById("metodologia").value = metodologia;
        document.getElementById("fecha_inicio").value = fecha_inicio;
        document.getElementById("fecha_fin").value = fecha_fin;
        document.getElementById("duracion_anios").value = duracion_anios;
        document.getElementById("duracion_semestres").value = duracion_semestres;
        document.getElementById("tipo_titulacion").value = tipo_titulacion;
        document.getElementById("programa_id").value = programa_id;
        document.getElementById("btn-submit").textContent = "Actualizar";
        document.getElementById("btn-cancelar").style.display = "inline-block";
        document.getElementById("form-rc").scrollIntoView({ behavior: "smooth" });
    }

    function cancelarEdicion() {
        registroEnEdicion = null;
        document.getElementById("form-rc").reset();
        document.getElementById("id_registro").value = "";
        document.getElementById("codigo").disabled = false;
        document.getElementById("btn-submit").textContent = "Guardar";
        document.getElementById("btn-cancelar").style.display = "none";
    }

    function eliminarRegistro(codigo) {
        if (!confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            return;
        }
        fetch(`${API_BASE}/api/registro_calificado/codigo/${codigo}`, {
            method: "DELETE"
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor (DELETE):", result);
            if (result.ok) {
                alert("Registro eliminado exitosamente.");
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al eliminar el registro:", error);
            alert("Error al eliminar el registro: " + error.message);
        });
    }

    let registroEnEdicion = null;

    window.onload = function() {
        cargarProgramas();
        cargarTabla();
        document.getElementById("btn-cancelar").addEventListener("click", cancelarEdicion);
    }

    document.getElementById("form-rc").addEventListener("submit", function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        const jsonData = {};
        for (let [key, value] of formData.entries()) {
            jsonData[key] = value;
        }
        
        const codigoRegistro = jsonData.id_registro;
        delete jsonData.id_registro;
        
        console.log("Enviando datos:", jsonData, "En edición:", registroEnEdicion);
        
        const metodo = registroEnEdicion ? "PUT" : "POST";
        const url = registroEnEdicion 
            ? `${API_BASE}/api/registro_calificado/codigo/${codigoRegistro}` 
            : `${API_BASE}/api/registro_calificado`;

        fetch(url, {
            method: metodo,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(jsonData)
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor:", result);
            if (result.ok && result.data.estado === 200) {
                alert(registroEnEdicion ? "Registro actualizado exitosamente." : "Registro creado exitosamente.");
                cancelarEdicion();
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al enviar el formulario:", error);
            alert("Error al enviar el formulario: " + error.message);
        });
    });
</script>

</body>
</html>
