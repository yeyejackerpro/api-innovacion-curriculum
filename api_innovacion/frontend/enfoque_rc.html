<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación Registro Calificado - Enfoque</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
<div class="container">
    <h1>Asignar Enfoque a Registro Calificado</h1>
    <form action="http://localhost:8000/api/enfoque_rc" method="POST" onsubmit="this.action = `${API_BASE}/api/enfoque_rc`;">
        <select name="codigo_rc" id="codigo_rc" required>
            <option value="">Seleccione Registro Calificado (FK)...</option>
            <option value="1">RC Ejemplo</option>
        </select>
        <select name="enfoque_id" id="enfoque_id" required>
            <option value="">Seleccione Enfoque (FK)...</option>
            <option value="1">Enfoque Ejemplo</option>
        </select>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>RC FK</th>
                <th>Enfoque FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
