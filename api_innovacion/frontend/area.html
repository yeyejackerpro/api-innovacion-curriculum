<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Área de Conocimiento</title>
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>

<div class="container">
<h1>Área de Conocimiento</h1>

<form id="form-area_conocimiento">
<input type="hidden" id="id_registro" name="id_registro">
<input type="text" name="gran_area" id="gran_area" placeholder="Gran Área" required>
<input type="text" name="area" id="area" placeholder="Área" required>
<input type="text" name="disciplina" id="disciplina" placeholder="Disciplina" required>
<button type="submit" id="btn-submit">Guardar</button>
<button type="button" id="btn-cancelar" style="display:none;">Cancelar</button>
</form>

<table>
<thead>
<tr>
<th>ID</th><th>Gran Área</th><th>Área</th><th>Disciplina</th><th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>
    let registroEnEdicion = null;

    function cargarTabla() {
        fetch(`${API_BASE}/api/area_conocimiento`)
        .then(response => {
            console.log("Response status:", response.status, "OK:", response.ok);
            if (response.status === 204) {
                return { datos: [] };
            }
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log("Datos recibidos de area_conocimiento:", data);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            if (data.datos && Array.isArray(data.datos)) {
                if (data.datos.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>';
                } else {
                    data.datos.forEach(objeto => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${objeto.id}</td>
                                <td>${objeto.gran_area}</td>
                                <td>${objeto.area}</td>
                                <td>${objeto.disciplina}</td>
                                <td>
                                    <button type="button" class="btn-editar" onclick="editarRegistro(${objeto.id}, '${objeto.gran_area}', '${objeto.area}', '${objeto.disciplina}')">Editar</button>
                                    <button type="button" class="btn-eliminar" onclick="eliminarRegistro(${objeto.id})">Eliminar</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } else {
                tabla.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Estructura de respuesta incorrecta</td></tr>';
                console.error("Estructura incorrecta:", data);
            }
        })
        .catch(error => {
            console.error("Error al cargar los datos:", error);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error: ${error.message}</td></tr>`;
        });
    }

    function editarRegistro(id, gran_area, area, disciplina) {
        registroEnEdicion = id;
        document.getElementById("id_registro").value = id;
        document.getElementById("gran_area").value = gran_area;
        document.getElementById("area").value = area;
        document.getElementById("disciplina").value = disciplina;
        document.getElementById("btn-submit").textContent = "Actualizar";
        document.getElementById("btn-cancelar").style.display = "inline-block";
        document.getElementById("form-area_conocimiento").scrollIntoView({ behavior: "smooth" });
    }

    function cancelarEdicion() {
        registroEnEdicion = null;
        document.getElementById("form-area_conocimiento").reset();
        document.getElementById("id_registro").value = "";
        document.getElementById("btn-submit").textContent = "Guardar";
        document.getElementById("btn-cancelar").style.display = "none";
    }

    function eliminarRegistro(id) {
        if (!confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            return;
        }
        fetch(`${API_BASE}/api/area_conocimiento/id/${id}`, {
            method: "DELETE"
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor (DELETE):", result);
            if (result.ok) {
                alert("Registro eliminado exitosamente.");
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al eliminar el registro:", error);
            alert("Error al eliminar el registro: " + error.message);
        });
    }

    window.onload = function() {
        cargarTabla();
        document.getElementById("btn-cancelar").addEventListener("click", cancelarEdicion);
    }

    document.getElementById("form-area_conocimiento").addEventListener("submit", function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        const jsonData = {};
        for (let [key, value] of formData.entries()) {
            jsonData[key] = value;
        }
        
        const idRegistro = jsonData.id_registro;
        delete jsonData.id_registro;
        
        console.log("Enviando datos:", jsonData, "En edición:", registroEnEdicion);
        
        const metodo = registroEnEdicion ? "PUT" : "POST";
        const url = registroEnEdicion 
            ? `${API_BASE}/api/area_conocimiento/id/${idRegistro}` 
            : `${API_BASE}/api/area_conocimiento`;

        fetch(url, {
            method: metodo,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(jsonData)
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor:", result);
            if (result.ok && result.data.estado === 200) {
                alert(registroEnEdicion ? "Registro actualizado exitosamente." : "Registro creado exitosamente.");
                cancelarEdicion();
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al enviar el formulario:", error);
            alert("Error al enviar el formulario: " + error.message);
        });
    });
</script>

</body>
</html>
