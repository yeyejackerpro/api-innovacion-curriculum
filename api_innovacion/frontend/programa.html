<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Programas Académicos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
<div class="container">
    <h1>Programas Académicos</h1>
    <form id="form-programa">
        <input type="hidden" id="id_registro" name="id_registro">
        <input type="text" name="nombre" id="nombre" placeholder="Nombre" required>
        <input type="text" name="tipo" id="tipo" placeholder="Tipo (ej. Pregrado)" required>
        <input type="text" name="nivel" id="nivel" placeholder="Nivel" required>
        <label for="fecha_creacion">Creación:</label>
        <input type="date" name="fecha_creacion" id="fecha_creacion" required>
        <label for="fecha_cierre">Cierre:</label>
        <input type="date" name="fecha_cierre" id="fecha_cierre">
        <input type="number" name="numero_cohortes" id="numero_cohortes" placeholder="Nº Cohortes" required>
        <input type="number" name="cant_graduados" id="cant_graduados" placeholder="Cant. Graduados" required>
        <label for="fecha_actualizacion">Actualización:</label>
        <input type="date" name="fecha_actualizacion" id="fecha_actualizacion">
        <input type="text" name="ciudad" id="ciudad" placeholder="Ciudad" required>
        <select name="facultad_id" id="facultad_id" required>
            <option value="">Seleccione Facultad (FK)...</option>
        </select>
        <button type="submit" id="btn-submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none;">Cancelar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Nivel</th>
                <th>Ciudad</th>
                <th>Facultad FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
    let registroEnEdicion = null;

    function cargarFacultades() {
        fetch(`${API_BASE}/api/facultad`)
        .then(response => {
            console.log("Response facultad status:", response.status);
            if (response.status === 204) return { datos: [] };
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log("Datos facultad:", data);
            const select = document.getElementById("facultad_id");
            if (data.datos && data.datos.length > 0) {
                select.innerHTML = '<option value="">Seleccione Facultad (FK)...</option>';
                data.datos.forEach(obj => {
                    select.innerHTML += `<option value="${obj.id}">${obj.nombre || obj.id}</option>`;
                });
            } else {
                select.innerHTML = '<option value="">No hay facultades disponibles</option>';
            }
        })
        .catch(error => {
            console.error("Error cargando facultades:", error);
            document.getElementById("facultad_id").innerHTML = `<option value="">Error: ${error.message}</option>`;
        });
    }

    function cargarTabla() {
        fetch(`${API_BASE}/api/programa`)
        .then(response => {
            console.log("Response status:", response.status, "OK:", response.ok);
            if (response.status === 204) {
                return { datos: [] };
            }
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            console.log("Datos recibidos de programa:", data);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            if (data.datos && Array.isArray(data.datos)) {
                if (data.datos.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay registros</td></tr>';
                } else {
                    data.datos.forEach(objeto => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${objeto.id}</td>
                                <td>${objeto.nombre}</td>
                                <td>${objeto.tipo}</td>
                                <td>${objeto.nivel}</td>
                                <td>${objeto.ciudad}</td>
                                <td>${objeto.facultad_id}</td>
                                <td>
                                    <button type="button" class="btn-editar" onclick="editarRegistro(${objeto.id}, '${objeto.nombre}', '${objeto.tipo}', '${objeto.nivel}', '${objeto.fecha_creacion}', '${objeto.fecha_cierre || ''}', ${objeto.numero_cohortes}, ${objeto.cant_graduados}, '${objeto.fecha_actualizacion || ''}', '${objeto.ciudad}', ${objeto.facultad_id})">Editar</button>
                                    <button type="button" class="btn-eliminar" onclick="eliminarRegistro(${objeto.id})">Eliminar</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } else {
                tabla.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Estructura de respuesta incorrecta</td></tr>';
                console.error("Estructura incorrecta:", data);
            }
        })
        .catch(error => {
            console.error("Error al cargar los datos:", error);
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Error: ${error.message}</td></tr>`;
        });
    }

    function editarRegistro(id, nombre, tipo, nivel, fecha_creacion, fecha_cierre, numero_cohortes, cant_graduados, fecha_actualizacion, ciudad, facultad_id) {
        registroEnEdicion = id;
        document.getElementById("id_registro").value = id;
        document.getElementById("nombre").value = nombre;
        document.getElementById("tipo").value = tipo;
        document.getElementById("nivel").value = nivel;
        document.getElementById("fecha_creacion").value = fecha_creacion;
        document.getElementById("fecha_cierre").value = fecha_cierre;
        document.getElementById("numero_cohortes").value = numero_cohortes;
        document.getElementById("cant_graduados").value = cant_graduados;
        document.getElementById("fecha_actualizacion").value = fecha_actualizacion;
        document.getElementById("ciudad").value = ciudad;
        document.getElementById("facultad_id").value = facultad_id;
        document.getElementById("btn-submit").textContent = "Actualizar";
        document.getElementById("btn-cancelar").style.display = "inline-block";
        document.getElementById("form-programa").scrollIntoView({ behavior: "smooth" });
    }

    function cancelarEdicion() {
        registroEnEdicion = null;
        document.getElementById("form-programa").reset();
        document.getElementById("id_registro").value = "";
        document.getElementById("btn-submit").textContent = "Guardar";
        document.getElementById("btn-cancelar").style.display = "none";
    }

    function eliminarRegistro(id) {
        if (!confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            return;
        }
        fetch(`${API_BASE}/api/programa/id/${id}`, {
            method: "DELETE"
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor (DELETE):", result);
            if (result.ok) {
                alert("Registro eliminado exitosamente.");
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al eliminar el registro:", error);
            alert("Error al eliminar el registro: " + error.message);
        });
    }

    window.onload = function() {
        cargarFacultades();
        cargarTabla();
        document.getElementById("btn-cancelar").addEventListener("click", cancelarEdicion);
    }

    document.getElementById("form-programa").addEventListener("submit", function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        const jsonData = {};
        for (let [key, value] of formData.entries()) {
            jsonData[key] = value;
        }
        
        const idRegistro = jsonData.id_registro;
        delete jsonData.id_registro;
        
        console.log("Enviando datos:", jsonData, "En edición:", registroEnEdicion);
        
        const metodo = registroEnEdicion ? "PUT" : "POST";
        const url = registroEnEdicion 
            ? `${API_BASE}/api/programa/id/${idRegistro}` 
            : `${API_BASE}/api/programa`;

        fetch(url, {
            method: metodo,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(jsonData)
        })
        .then(response => {
            return response.json().then(data => ({
                status: response.status,
                ok: response.ok,
                data: data
            }));
        })
        .then(result => {
            console.log("Respuesta del servidor:", result);
            if (result.ok && result.data.estado === 200) {
                alert(registroEnEdicion ? "Registro actualizado exitosamente." : "Registro creado exitosamente.");
                cancelarEdicion();
                cargarTabla();
            } else {
                const errorMsg = result.data.detalle || result.data.mensaje || "Error desconocido";
                console.error("Error en detalle:", errorMsg);
                alert("Error: " + errorMsg);
            }
        })
        .catch(error => {
            console.error("Error al enviar el formulario:", error);
            alert("Error al enviar el formulario: " + error.message);
        });
    });
</script>

</body>
</html>
