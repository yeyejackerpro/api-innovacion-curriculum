services:
  - type: web
    name: api-innovacion-curriculum
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_PROVIDER
        value: postgres
      # Configure la cadena de conexión real en el panel de Render como DB_POSTGRES, DB_MYSQL, etc.
    runtimeData:
      packages:
        - unixodbc
        - unixodbc-dev
