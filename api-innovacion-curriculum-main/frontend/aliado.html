<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>aliados</title>
</head>
<body>
    <div class="container">
        <h1>Aliados</h1>
        <form action="http://localhost:8000/api/aliado" method="POST">
            <input type="text" name="nit" id="nit" placeholder="NIT" required>
            <input type="text" name="razon_social" id="razon_social" placeholder="Razon Social" required>
            <input type="text" name="nombre_contacto" id="nombre_contacto" placeholder="Nombre Contacto" required>
            <input type="text" name="correo" id="correo" placeholder="Correo"required>
            <input type="text" name="telefono" id="telefono" placeholder="Telefono"required>
            <input type="text" name="ciudad" id="ciudad" placeholder="Ciudad" required>            
            <button>Guardar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>NIT</th><th>Razon Social</th><th>Contacto</th><th>Correo</th><th>Telefono</th><th>Ciudad</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
    </div>


</body>
</html>
