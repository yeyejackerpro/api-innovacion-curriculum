<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registros Calificados</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="container">
    <h1>Registros Calificados</h1>
    <form action="http://localhost:8000/api/registrocalificado" method="POST">
        <input type="text" name="codigo" id="codigo" placeholder="Código (PK)" required>
        <input type="number" name="cant_creditos" id="cant_creditos" placeholder="Cant. Créditos" required>
        <input type="number" name="hora_acom" id="hora_acom" placeholder="Horas Acompañamiento" required>
        <input type="number" name="hora_ind" id="hora_ind" placeholder="Horas Independientes" required>
        <input type="text" name="metodologia" id="metodologia" placeholder="Metodología" required>
        <label for="fecha_inicio">Fecha Inicio:</label>
        <input type="date" name="fecha_inicio" id="fecha_inicio" required>
        <label for="fecha_fin">Fecha Fin:</label>
        <input type="date" name="fecha_fin" id="fecha_fin" required>
        <input type="number" name="duracion_anios" id="duracion_anios" placeholder="Duración Años" required>
        <input type="number" name="duracion_semestres" id="duracion_semestres" placeholder="Duración Semestres" required>
        <input type="text" name="tipo_titulacion" id="tipo_titulacion" placeholder="Tipo Titulación" required>
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Código (PK)</th>
                <th>Créditos</th>
                <th>Metodología</th>
                <th>Vigencia</th>
                <th>Programa FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
