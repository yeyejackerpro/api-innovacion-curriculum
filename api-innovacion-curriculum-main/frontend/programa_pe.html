<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación Programa - Práctica / Estrategia</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="container">
    <h1>Asignar Práctica/Estrategia a Programa</h1>
    <form id="form">
        <select id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <select id="practica_estrategia_id" required>
            <option value="">Seleccione Práctica / Estrategia (FK)...</option>
            <option value="1">Práctica Ejemplo</option>
        </select>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Programa FK</th>
                <th>Práctica Estrategia FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
