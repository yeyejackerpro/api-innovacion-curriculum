<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad Académica en Registro Calificado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Vincular Actividad Académica y RC</h1>
    <form action="http://localhost:8000/api/aarc" method="POST">
        <select name="codigo_rc" id="codigo_rc" required>
            <option value="">Seleccione Registro Calificado (FK)...</option>
            <option value="1">RC Ejemplo</option>
        </select>
        <select name="actividad_id" id="actividad_id" required>
            <option value="">Seleccione Actividad Académica (FK)...</option>
            <option value="1">Actividad Ejemplo</option>
        </select>
        <input type="text" name="componente" id="componente" placeholder="Componente" required>
        <input type="number" name="semestre" id="semestre" placeholder="Semestre" required>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>RC FK</th>
                <th>Actividad FK</th>
                <th>Componente</th>
                <th>Semestre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/aarc")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.rc_fk}</td>
                        <td>${objeto.actividad_fk}</td>
                        <td>${objeto.componente}</td>
                        <td>${objeto.semestre}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
