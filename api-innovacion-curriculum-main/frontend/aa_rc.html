<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad Académica en Registro Calificado</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="container">
    <h1>Vincular Actividad Académica y RC</h1>
    <form id="form">
        <select id="codigo_rc" required>
            <option value="">Seleccione Registro Calificado (FK)...</option>
            <option value="1">RC Ejemplo</option>
        </select>
        <select id="actividad_id" required>
            <option value="">Seleccione Actividad Académica (FK)...</option>
            <option value="1">Actividad Ejemplo</option>
        </select>
        <input type="text" id="componente" placeholder="Componente" required>
        <input type="number" id="semestre" placeholder="Semestre" required>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>RC FK</th>
                <th>Actividad FK</th>
                <th>Componente</th>
                <th>Semestre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
