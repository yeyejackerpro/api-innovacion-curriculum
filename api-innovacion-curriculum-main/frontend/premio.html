<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Premios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Premios</h1>
    <form action="http://localhost:8000/api/premio" method="POST">
        <input type="text" name="nombre" id="nombre" placeholder="Nombre Premio" required>
        <input type="text" name="descripcion" id="descripcion" placeholder="Descripción" required>
        <label for="fecha">Fecha:</label>
        <input type="date" name="fecha" id="fecha" required>
        <input type="text" name="entidad_otorgante" id="entidad_otorgante" placeholder="Entidad Otorgante" required>
        <input type="text" name="pais" id="pais" placeholder="País" required>
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Entidad</th>
                <th>Fecha</th>
                <th>Programa FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/premio")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.id}</td>
                        <td>${objeto.nombre}</td>
                        <td>${objeto.entidad_otorgante}</td>
                        <td>${objeto.fecha}</td>
                        <td>${objeto.programa_fk}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
