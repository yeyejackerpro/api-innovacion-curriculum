<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Innovación Curricular</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       1. RESET Y BASE
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;           /* fondo de página gris claro */
      color: #111827;
      min-height: 100vh;
      padding: 24px 20px 40px;
    }

    /* =============================================
       2. CONTENEDOR PRINCIPAL DEL DASHBOARD
       ============================================= */
    .dashboard {
      max-width: 960px;              /* ancho máximo centrado */
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;           /* esquinas redondeadas del card grande */
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    /* =============================================
       3. HEADER SUPERIOR
       ============================================= */
    .dashboard-header {
      padding: 16px 28px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafb;           /* fondo levemente gris */
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Cuadro verde del logo */
    .logo-box {
      width: 40px;
      height: 40px;
      background: #1D9E75;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-meta {
      text-align: right;
    }

    .header-meta p {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
    }

    /* Avatar circular con iniciales */
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #E1F5EE;
      border: 1px solid #d1fae5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #065f46;
      cursor: default;
    }

    /* =============================================
       4. CUERPO / CONTENIDO PRINCIPAL
       ============================================= */
    .dashboard-body {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;                     /* espacio entre secciones */
    }

    /* =============================================
       5. ENCABEZADO DE CADA SECCIÓN
       ============================================= */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    /* Barra de color lateral (3px) */
    .section-bar {
      width: 3px;
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }

    /* Badge con número de módulos */
    .section-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 99px;           /* forma de píldora */
    }

    /* Colores por sección — barra y badge */
    .sec-green  .section-bar  { background: #1D9E75; }
    .sec-green  .section-badge { background: #E1F5EE; color: #065f46; }

    .sec-blue   .section-bar  { background: #185FA5; }
    .sec-blue   .section-badge { background: #E6F1FB; color: #0c447c; }

    .sec-amber  .section-bar  { background: #BA7517; }
    .sec-amber  .section-badge { background: #FAEEDA; color: #633806; }

    .sec-purple .section-bar  { background: #534AB7; }
    .sec-purple .section-badge { background: #EEEDFE; color: #26215c; }

    /* =============================================
       6. GRID DE TARJETAS
       ============================================= */
    .section-grid {
      display: grid;
      /* auto-fit: crea columnas que se reorganizan solas */
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }

    /* =============================================
       7. TARJETA DE MÓDULO
       ============================================= */
    .module-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 13px 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .module-card:hover {
      background: #f9fafb;
      border-color: #9ca3af;
      transform: translateY(-1px);   /* sube 1px al hacer hover */
    }

    .module-card:active {
      transform: translateY(0px);    /* vuelve al hacer click */
    }

    /* Cuadro de ícono */
    .module-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .module-name {
      font-size: 12px;
      font-weight: 500;
      color: #111827;
      line-height: 1.35;
    }

    /* Colores de ícono por sección */
    .sec-green  .module-icon { background: #E1F5EE; }
    .sec-blue   .module-icon { background: #E6F1FB; }
    .sec-amber  .module-icon { background: #FAEEDA; }
    .sec-purple .module-icon { background: #EEEDFE; }

    /* =============================================
       8. FOOTER DEL DASHBOARD
       ============================================= */
    .dashboard-footer {
      padding: 11px 28px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-hint {
      font-size: 11px;
      color: #9ca3af;
    }

    .footer-tags {
      display: flex;
      gap: 6px;
    }

    .footer-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 4px;
    }

    /* =============================================
       9. RESPONSIVE — pantallas pequeñas
       ============================================= */
    @media (max-width: 600px) {
      body { padding: 12px 10px 32px; }
      .dashboard-body { padding: 20px 16px; }
      .dashboard-header { padding: 14px 16px; }
      .dashboard-footer { padding: 10px 16px; }
      .header-meta { display: none; }   /* ocultamos meta en móvil */
      .section-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }
  </style>
</head>
