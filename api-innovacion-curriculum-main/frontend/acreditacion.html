<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acreditaciones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Acreditaciones</h1>
    <form action="http://localhost:8000/api/acreditacion" method="POST">
        <input type="text" name="resolucion" id="resolucion" placeholder="Número Resolución (PK)" required>
        <input type="text" name="tipo" id="tipo" placeholder="Tipo de Acreditación" required>
        <input type="text" name="calificacion" id="calificacion" placeholder="Calificación" required>
        <label for="fecha_inicio">Fecha Inicio:</label>
        <input type="date" name="fecha_inicio" id="fecha_inicio" required>
        <label for="fecha_fin">Fecha Fin:</label>
        <input type="date" name="fecha_fin" id="fecha_fin" required>
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Resolución (PK)</th>
                <th>Tipo</th>
                <th>Calificación</th>
                <th>Fechas</th>
                <th>Programa FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/acreditacion")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.resolucion}</td>
                        <td>${objeto.tipo}</td>
                        <td>${objeto.calificacion}</td>
                        <td>${objeto.fechas}</td>
                        <td>${objeto.programa}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
