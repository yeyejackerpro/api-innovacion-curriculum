<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación Programa - Área de Conocimiento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Asignar Área de Conocimiento a Programa</h1>
    <form action="http://localhost:8000/api/programaac" method="POST">
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <select name="area_conocimiento_id" id="area_conocimiento_id" required>
            <option value="">Seleccione Área de Conocimiento (FK)...</option>
            <option value="1">Área Ejemplo</option>
        </select>
        <button type="submit">Asignar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Programa FK</th>
                <th>Área FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/programaac")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.programa_fk}</td>
                        <td>${objeto.area_fk}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
