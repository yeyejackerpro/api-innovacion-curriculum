<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Área de Conocimiento</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
<h1>Área de Conocimiento</h1>

<form action="http://localhost:8000/api/areaconocimiento" method="POST">
<input type="text" name="gran_area" id="gran_area" placeholder="Gran Área" required>
<input type="text" name="area" id="area" placeholder="Área" required>
<input type="text" name="disciplina" id="disciplina" placeholder="Disciplina" required>
<button>Guardar</button>
</form>

<table>
<thead>
<tr>
<th>ID</th><th>Gran Área</th><th>Área</th><th>Disciplina</th><th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/areaconocimiento")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.id}</td>
                        <td>${objeto.gran_area}</td>
                        <td>${objeto.area}</td>
                        <td>${objeto.disciplina}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
