<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facultades</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="container">
    <h1>Facultades</h1>
    <form id="form">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <select id="tipo" required>
            <option value="">Seleccione Tipo...</option>
            <option value="Facultad">Facultad</option>
            <option value="Departamento">Departamento</option>
            <option value="Instituto">Instituto</option>
        </select>
        <label for="fecha_fun">Fecha Fundación:</label>
        <input type="date" id="fecha_fun" required>
        <select id="universidad_id" required>
            <option value="">Seleccione Universidad (FK)...</option>
            <option value="1">Universidad Ejemplo</option>
        </select>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Fecha Fundación</th>
                <th>Universidad (Sede)</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
