<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividades Académicas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Actividades Académicas</h1>
    <form action="http://localhost:8000/api/activacademica" method="POST">
        <input type="text" name="nombre" id="nombre" placeholder="Nombre (Materia/Curso)" required>
        <input type="number" name="num_creditos" id="num_creditos" placeholder="Créditos" required>
        <input type="text" name="tipo" id="tipo" placeholder="Tipo" required>
        <input type="text" name="area_formacion" id="area_formacion" placeholder="Área Formación" required>
        <input type="number" name="h_acom" id="h_acom" placeholder="H. Acompañamiento" required>
        <input type="number" name="h_indep" id="h_indep" placeholder="H. Independientes" required>
        <input type="text" name="idioma" id="idioma" placeholder="Idioma" required>
        
        <label>
            <input type="checkbox" name="espejo" id="espejo"> ¿Es Tipo Espejo?
        </label>
        <input type="text" name="entidad_espejo" id="entidad_espejo" placeholder="Entidad Espejo (Opcional)">
        <input type="text" name="pais_espejo" id="pais_espejo" placeholder="País Espejo (Opcional)">
        
        <select name="programa_id" id="programa_id" required>
            <option value="">Seleccione Programa (FK)...</option>
            <option value="1">Programa Ejemplo</option>
        </select>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Créditos</th>
                <th>Área Formación</th>
                <th>Programa FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>

<script>
window.onload = function() {
    fetch("http://localhost:8000/api/activacademica")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.id}</td>
                        <td>${objeto.nombre}</td>
                        <td>${objeto.num_creditos}</td>
                        <td>${objeto.area_formacion}</td>
                        <td>${objeto.programa}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
