<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Innovación</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
<h1>Innovación Curricular</h1>

<form action="http://localhost:8000/api/carinnovacion" method="POST">
<input type="text" name="nombre" id="nombre" placeholder="Nombre" required>
<input type="text" name="descripcion" id="descripcion" placeholder="Descripción" required>
<input type="text" name="tipo" id="tipo" placeholder="Tipo" required>
<button>Guardar</button>
</form>

<table>
<thead>
<tr>
<th>ID</th><th>Nombre</th><th>Descripción</th><th>Tipo</th><th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>


<script>
window.onload = function() {
    fetch("http://localhost:8000/api/carinnovacion")
        .then(response => response.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";
            data.forEach(objeto => {
                tabla.innerHTML += `
                    <tr>
                        <td>${objeto.id}</td>
                        <td>${objeto.nombre}</td>
                        <td>${objeto.descripcion}</td>
                        <td>${objeto.tipo}</td>
                        <td>Editar | Eliminar</td>
                    </tr>
                `;
            });
        });
};
</script>

</body>
</html>
