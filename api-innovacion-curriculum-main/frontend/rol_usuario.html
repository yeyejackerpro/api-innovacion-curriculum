<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Roles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Asignar Rol a Usuario</h1>
    <form action="http://localhost:8000/api/rolusuario" method="POST">
        <select name="usuario_id" id="usuario_id" required>
            <option value="">Seleccione Usuario (FK)...</option>
            <option value="1">Usuario Ejemplo</option>
        </select>
        <select name="rol_id" id="rol_id" required>
            <option value="">Seleccione Rol (FK)...</option>
            <option value="1">Admin</option>
        </select>
        <button type="submit">Asignar Rol</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Usuario FK</th>
                <th>Rol FK</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
