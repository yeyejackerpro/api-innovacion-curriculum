<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Gestión de Usuarios</h1>
    <form action="http://localhost:8000/api/usuario" method="POST">
        <input type="text" name="username" id="username" placeholder="Nombre de Usuario" required>
        <input type="email" name="email" id="email" placeholder="Correo Electrónico" required>
        <input type="text" name="nombre_completo" id="nombre_completo" placeholder="Nombre Completo" required>
        <input type="password" name="password" id="password" placeholder="Contraseña" required>
        <label>
            <input type="checkbox" name="activo" id="activo" checked> Activo
        </label>
        <button type="submit">Crear Usuario</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Nombre</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
