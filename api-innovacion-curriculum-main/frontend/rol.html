<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Roles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Roles del Sistema</h1>
    <form action="http://localhost:8000/api/rol" method="POST">
        <input type="text" name="nombre" id="nombre" placeholder="Nombre del Rol (Ej. Admin)" required>
        <input type="text" name="descripcion" id="descripcion" placeholder="Descripción" required>
        <label>
            <input type="checkbox" name="activo" id="activo" checked> Activo
        </label>
        <button type="submit">Guardar Rol</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Creación</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>
</div>
</body>
</html>
