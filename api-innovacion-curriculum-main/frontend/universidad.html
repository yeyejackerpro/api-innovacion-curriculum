<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universidades</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Universidades</h1>
    <form action="http://localhost:8000/api/universidad" method="POST">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <select name="tipo" required>
            <option value="">Seleccione Tipo...</option>
            <option value="Seccional">Seccional</option>
            <option value="Extensión">Extensión</option>
        </select>
        <input type="text" name="ciudad" placeholder="Ciudad" required>
        <button type="submit">Guardar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th> <th>Nombre</th> <th>Tipo</th> <th>Ciudad</th> <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>
<script>
async function cargarUniversidades() {
    try {
        const response = await fetch("http://localhost:8000/api/universidad");
        const data = await response.json();

        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        data.forEach(universidad => {
            tabla.innerHTML += `
                <tr>
                    <td>${universidad.id}</td>
                    <td>${universidad.nombre}</td>
                    <td>${universidad.tipo}</td>
                    <td>${universidad.ciudad}</td>
                    <td>Editar | Eliminar</td>
                </tr>
            `;
        });

    } catch (error) {
        console.error("Error cargando universidades:", error);
    }
}

cargarUniversidades();
</script>
</body>
</html>
