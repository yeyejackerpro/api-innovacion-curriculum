<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universidades</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

<h1>Universidades</h1>

<form id="form">
    <input type="text" id="nombre" placeholder="Nombre" required>
    
    <select id="tipo">
        <option>Seccional</option>
        <option>Extensión</option>
    </select>

    <input type="text" id="ciudad" placeholder="Ciudad" required>

    <button type="submit">Guardar</button>
</form>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Ciudad</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

</div>

<script src="app.js"></script>

</body>
</html>
